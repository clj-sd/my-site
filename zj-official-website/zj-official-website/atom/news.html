<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();

    function render(){
        var D = SiteLoader.WebData, d = D.get('atom.news');
        if(!d) return;
        document.getElementById('anTitle').textContent = d.title || '项目动态';
        document.title = (d.title||'项目动态') + ' — 中经原子 | BNCT最新进展与行业资讯';
        var items = d.items || [];
        var nH = '';
        items.forEach(function(n){
            nH += '<div class="news-card"><span class="news-date">'+n.date+'</span>';
            nH += '<div><div class="news-title">'+n.title+'</div><div class="news-summary">'+n.summary+'</div></div></div>';
        });
        document.getElementById('anNewsList').innerHTML = nH || '<p style="color:#889;text-align:center">暂无新闻</p>';
    }
})();
</script>
