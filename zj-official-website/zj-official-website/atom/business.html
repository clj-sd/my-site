<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();

    function render(){
        var D = SiteLoader.WebData, d = D.get('atom.business');
        if(!d) return;
        document.getElementById('abTitle').textContent = d.title || '核心业务';
        document.title = (d.title||'核心业务') + ' — BNCT硼中子俘获治疗技术 | 中经原子';
        var sections = d.sections || [];
        var principle = sections.find(function(s){return s.id==='principle';});
        var advSec = sections.find(function(s){return s.id==='advantages';});
        if(principle){
            document.getElementById('abSec1Title').textContent = principle.title || '技术原理';
            var steps = principle.content || [];
            var stepH = '';
            steps.forEach(function(s,i){
                stepH += (i>0?'<span class="principle-arrow">→</span>':'')+'<span class="principle-step">'+s.subtitle+'</span>';
            });
            document.getElementById('abPrinciple').innerHTML = stepH;
        }
        if(advSec){
            document.getElementById('abSec2Title').textContent = advSec.title || '技术优势';
            var icons = ['🎯','⚡','🌐','🛡️','🔬','💊'];
            var items = advSec.items || [];
            var advH = '';
            items.forEach(function(item,i){ advH += '<div class="advantage-item"><span class="advantage-icon">'+(icons[i]||'✨')+'</span><div class="advantage-title">'+item+'</div></div>'; });
            document.getElementById('abAdvantages').innerHTML = advH || '<p style="color:#889;text-align:center">暂无数据</p>';
        }
    }
})();
</script>
