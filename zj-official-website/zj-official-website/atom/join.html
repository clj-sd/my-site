    <div class="header-inner">
        <div class="logo">中经原子</div>
        <nav class="nav"><ul>
            <li><a href="index.html">首页</a></li><li><a href="about.html">关于我们</a></li>

</header>

<main class="main">
    <section class="page-hero">
        <h1 id="ajTitle">人才招聘</h1>
        <p class="hero-sub">加入前沿科研平台，共创BNCT精准医疗未来</p>
    </section>
    <div class="page-container">
        <div class="section-card">
            <p class="intro-paragraph" id="ajIntro"></p>

        <div class="section-card">
            <div class="sub-title"><span class="badge">社</span> 社会招聘</div>
            <div class="job-grid" id="ajPositions"></div>
        </div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">校</span> 校园招聘</div>
            <div class="campus-notice">
                <div class="campus-title">🎓 校园招聘公告</div>

        </div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">投</span> 简历投递</div>
            <div class="email-box">
                <div class="email-label">请将简历发送至以下邮箱</div>
                <div class="email-address" id="ajEmail">hr@zjatom.com</div>
                <div class="email-note">邮件主题请注明："应聘岗位-姓名-专业-学历"，我们将在收到简历后一周内与合适人选联系。</div>

<script src="../js/data-loader.js" data-root="../"></script>
<script src="../js/site-loader.js"></script>
<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();

    function render(){
        var D = SiteLoader.WebData, d = D.get('atom.join');
        if(!d) return;
        document.getElementById('ajTitle').textContent = d.title || '人才招聘';
        document.title = (d.title||'人才招聘') + ' — 中经原子 | BNCT核技术医疗人才';
        document.getElementById('ajIntro').textContent = d.intro || '';
        document.getElementById('ajCampusNotice').textContent = d.campusNotice || '';
        var positions = d.positions || [];
        var pH = '';
        positions.forEach(function(p){
            pH += '<div class="job-card"><div class="job-header"><span class="job-title">'+p.title+'</span><span class="job-tag">'+p.type+'</span></div>';
            pH += '<div class="job-meta">📍 '+p.location+' · 🏷 '+p.dept+'</div>';
            pH += '<div class="job-desc">'+p.desc+'</div></div>';
        });
        document.getElementById('ajPositions').innerHTML = pH || '<p style="color:#889;text-align:center;width:100%">暂无职位</p>';
        var site = D.get('site');
        if(site && site.contactEmail) document.getElementById('ajEmail').textContent = site.contactEmail;
    }
})();
</script>
</body>
</html>
