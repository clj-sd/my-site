<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>官网后台管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a1628 0%,#1a2744 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.login-box h1{text-align:center;color:#1a2744;font-size:26px;margin-bottom:6px}
.login-box .sub{text-align:center;color:#8899aa;font-size:14px;margin-bottom:36px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;color:#445566;margin-bottom:6px;font-weight:600}
.form-group input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:15px;transition:border-color .2s;outline:none}
.form-group input:focus{border-color:#3b6df0}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(37,99,235,.4)}
.error-msg{color:#e53e3e;font-size:13px;text-align:center;margin-top:12px;display:none}
.hint{text-align:center;margin-top:24px;font-size:12px;color:#aab}
</style>
</head>
<body>
<div class="login-box">
<h1>⚙️ 官网后台</h1>
<p class="sub">中经集团官方网站管理系统</p>
<form id="loginForm">
<div class="form-group">
<label>用户名</label>
<input type="text" id="username" placeholder="请输入用户名" required>
</div>
<div class="form-group">
<label>密码</label>
<input type="password" id="password" placeholder="请输入密码" required>
</div>
<button type="submit" class="btn-login">登 录</button>
<p class="error-msg" id="errorMsg">用户名或密码错误</p>
</form>
<p class="hint">默认账号: admin / 密码: admin123</p>
</div>

<script>
(function(){
  const DEFAULT_USER = 'admin';
  const DEFAULT_PASS = 'admin123';

  if(!localStorage.getItem('admin_user')){
    localStorage.setItem('admin_user', JSON.stringify({username:DEFAULT_USER,password:DEFAULT_PASS}));
  }

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    var stored = JSON.parse(localStorage.getItem('admin_user'));
    if(u === stored.username && p === stored.password){
      sessionStorage.setItem('admin_logged_in','1');
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }
  });
})();
</script>
</body>
</html>
