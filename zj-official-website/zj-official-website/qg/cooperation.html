<main class="main">
    <section class="page-hero"><h1 id="qcTitle">商务合作</h1><p class="hero-sub">委托运营 · 合资共建 · 咨询服务 — 期待与您互利共赢</p></section>

            <div class="sub-title"><span class="badge">🤝</span> 合作模式</div>
            <div class="mode-grid" id="qcModes"><!-- JS --></div>
        </div>
        <div class="section-card">

                <div class="contact-chip"><span class="chip-icon">📧</span><div><div class="chip-label">合作邮箱</div><div class="chip-value" id="qcEmail">info@zjqg.com</div></div></div>
                <div class="contact-chip"><span class="chip-icon">📱</span><div><div class="chip-label">联系电话</div><div class="chip-value" id="qcPhone">010-XXXXXXX</div><div class="chip-label" style="margin-top:2px" id="qcHours">工作日 9:00 - 18:00</div></div></div>

<script src="../js/data-loader.js" data-root="../"></script>
<script src="../js/site-loader.js"></script>
<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();
    function render(){
        var D = SiteLoader.WebData, d = D.get('qg.cooperation'), c = D.get('qg.contact'), site = D.get('site');
        if(!d) return;
        document.getElementById('qcTitle').textContent = d.title || '商务合作';
        document.title = (d.title||'商务合作') + ' — 中经企管';

        var modes = d.modes || [];
        var mH = '';
        modes.forEach(function(m){
            mH += '<div class="mode-card"><span class="mode-icon">'+m.icon+'</span><div class="mode-title">'+m.title+'</div><p class="mode-desc">'+m.desc+'</p>';
            if(m.steps && m.steps.length){
                mH += '<div class="mode-steps">';
                m.steps.forEach(function(s){ mH += '<span class="mode-step-chip">'+s+'</span>'; });
                mH += '</div>';
            }
            mH += '</div>';
        });
        document.getElementById('qcModes').innerHTML = mH || '<p style="color:#889">暂无数据</p>';

        if(c){ document.getElementById('qcEmail').textContent = c.email || 'info@zjqg.com'; document.getElementById('qcPhone').textContent = c.phone || '-'; document.getElementById('qcHours').textContent = c.workingHours || ''; }
    }
})();
</script>
</body>
