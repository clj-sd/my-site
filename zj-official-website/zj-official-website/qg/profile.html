<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>企业简介 — 中经企业管理有限公司 | 园区运营 · 资产管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="中经企业管理有限公司企业简介，国有控股企业综合服务商，深耕园区运营、资产管理、管理咨询三大赛道。" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.zj-group.com/qg/profile.html" />
    <link rel="stylesheet" href="../css/style.css" />
    <meta property="og:title" content="企业简介 — 中经企业管理有限公司" />
    <style>
        .timeline { display: flex; flex-direction: column; padding-left: 32px; border-left: 2px solid var(--gray-200); margin-left: 10px; }
        .timeline-item { position: relative; padding: 16px 0 16px 24px; }
        .timeline-item::before { content: ""; position: absolute; left: -38px; top: 22px; width: 12px; height: 12px; background: var(--qg-primary); border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 0 2px var(--qg-primary); }
        .timeline-year { font-weight: 700; color: var(--qg-primary); font-size: 16px; margin-bottom: 4px; }
        .timeline-desc { color: var(--gray-600); font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body class="qg-theme">

<header class="header">
    <div class="header-inner">
        <div class="logo">中经企管</div>
        <nav class="nav"><ul>
            <li><a href="index.html">首页</a></li><li><a href="profile.html">企业简介</a></li>
            <li><a href="service.html">管理服务</a></li><li><a href="dynamic.html">新闻动态</a></li>
            <li><a href="cooperation.html">商务合作</a></li><li><a href="contact.html">联系我们</a></li>
        </ul></nav>
    </div>
</header>

<main class="main">
    <section class="page-hero"><h1 id="qpTitle">企业简介</h1><p class="hero-sub">国有控股企业综合服务商</p></section>
    <div class="page-container">
        <div class="section-card">
            <div class="sub-title"><span class="badge">🏢</span> 公司概况</div>
            <p class="intro-paragraph" id="qpIntro"></p>
        </div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">📅</span> 发展历程</div>
            <div class="timeline" id="qpTimeline"></div>
        </div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">💡</span> 企业文化</div>
            <div class="culture-row" id="qpCulture"></div>
        </div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">🛡️</span> 资质证明</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px">
                <div class="cert-card">
                    <p style="font-weight:600">📄 营业执照</p><p style="font-size:12px;color:#999">待上传</p>
                </div>
                <div class="cert-card">
                    <p style="font-weight:600">🛡️ 企业服务资质证书</p><p style="font-size:12px;color:#999">待上传</p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">&copy; 2026 中经企业管理有限公司 版权所有<br/>
    <a href="https://beian.miit.gov.cn" target="_blank" rel="nofollow noopener">京ICP备XXXXXXXX号</a></div>
</footer>

<script src="../js/data-loader.js" data-root="../"></script>
<script src="../js/site-loader.js"></script>
<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();
    function render(){
        var D = SiteLoader.WebData, d = D.get('qg.profile');
        if(!d) return;
        document.getElementById('qpTitle').textContent = d.title || '企业简介';
        document.title = (d.title||'企业简介') + ' — 中经企业管理有限公司';
        document.getElementById('qpIntro').textContent = d.intro || '';
        var ms = d.milestones || [], mH = '';
        ms.forEach(function(m){ mH += '<div class="timeline-item"><div class="timeline-year">'+m.year+'年</div><p class="timeline-desc">'+m.event+'</p></div>'; });
        document.getElementById('qpTimeline').innerHTML = mH || '<p style="color:#889">暂无数据</p>';
        var culture = d.culture || [], cH = '';
        culture.forEach(function(c){ cH += '<span class="culture-tag">'+c.title+'：'+c.content+'</span>'; });
        document.getElementById('qpCulture').innerHTML = cH || '<p style="color:#889">暂无数据</p>';
    }
})();
</script>
</body>
</html>
