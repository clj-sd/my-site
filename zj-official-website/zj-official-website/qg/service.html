    <meta name="keywords" content="园区运营管理,国有资产管理,管理咨询,企业服务,招商引资,企业孵化,资产盘活,中经企管" />

    <meta property="og:url" content="https://www.zj-group.com/qg/service.html" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        .qg-theme { --accent: #0b3d91; --accent-light: #e8f0fe; --gradient-start: #0b3d91; --gradient-end: #1a5ec4; --bg-soft: #f6f9fc; --card-shadow: 0 1px 3px rgba(0,0,0,0.06); --card-shadow-hover: 0 10px 32px rgba(0,0,0,0.10); }
        .main { background: linear-gradient(180deg, #f4f7fb 0%, #fff 25%, #fff 75%, #f4f7fb 100%); padding-top: 0; padding-bottom: 20px; }
        .page-hero { background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%); padding: 72px 0 56px; text-align: center; color: #fff; position: relative; overflow: hidden; }
        .page-hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.06) 0%, transparent 50%); pointer-events: none; }
        .page-hero h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 700; letter-spacing: 1px; margin-bottom: 14px; position: relative; }
        .page-hero .hero-sub { font-size: 16px; opacity: .82; font-weight: 400; position: relative; }
        .page-container { max-width: 900px; margin: -28px auto 0; padding: 0 20px 60px; position: relative; z-index: 1; }
        .section-card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 40px 44px; margin-bottom: 28px; transition: box-shadow 0.3s ease; }
        .section-card:hover { box-shadow: var(--card-shadow-hover); }
        .sub-title { font-size: 22px; color: var(--accent); font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .sub-title .badge { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 10px; background: var(--accent-light); color: var(--accent); font-size: 16px; font-weight: 700; flex-shrink: 0; }
        .intro-paragraph { text-align: justify; color: #555; line-height: 1.9; font-size: 15px; margin-bottom: 0; }
        .detail-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .detail-chip { background: var(--accent-light); color: var(--accent); padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .case-list { display: flex; flex-direction: column; gap: 14px; }
        .case-card { background: var(--bg-soft); border: 1px solid transparent; border-radius: 10px; padding: 24px 28px; text-align: left; transition: all 0.3s ease; display: flex; align-items: center; gap: 18px; }
        .case-card:hover { transform: translateX(6px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: #dce5f2; background: #fff; }
        .case-icon { font-size: 32px; flex-shrink: 0; }
        .case-info h4 { font-size: 17px; color: #1a1a1a; margin: 0 0 4px 0; font-weight: 700; }
        .case-info p { margin: 0; color: #666; font-size: 14px; line-height: 1.6; }
        .footer { margin-top: 40px; }
        @media (max-width: 640px) { .section-card { padding: 28px 20px; } .case-card { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body class="qg-theme">

<header class="header">
    <div class="header-inner">
        <div class="logo">中经企管</div>
        <nav class="nav"><ul>
            <li><a href="index.html">首页</a></li><li><a href="profile.html">企业简介</a></li>
            <li><a href="service.html">管理服务</a></li><li><a href="dynamic.html">新闻动态</a></li>
            <li><a href="cooperation.html">商务合作</a></li><li><a href="contact.html">联系我们</a></li>
        </ul></nav>
    </div>
</header>

<main class="main">
    <section class="page-hero"><h1 id="qsTitle">核心管理服务</h1><p class="hero-sub">园区运营 · 资产管理 · 管理咨询 — 一站式企业综合服务</p></section>
    <div class="page-container">
        <div id="qsServices"><!-- JS --></div>
        <div class="section-card">
            <div class="sub-title"><span class="badge">⭐</span> 服务案例</div>
            <div class="case-list" id="qsCases"><!-- JS填充 --></div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">&copy; 2026 中经企业管理有限公司 版权所有<br/>
    <a href="https://beian.miit.gov.cn" target="_blank" rel="nofollow noopener">京ICP备XXXXXXXX号</a></div>
</footer>

<script src="../js/data-loader.js" data-root="../"></script>
<script src="../js/site-loader.js"></script>
<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();
    function render(){
        var D = SiteLoader.WebData, d = D.get('qg.service');
        if(!d) return;
        document.getElementById('qsTitle').textContent = d.title || '核心管理服务';
        document.title = (d.title||'管理服务') + ' — 中经企管';
        var items = d.items || [];
        var sH = '', caseH = '';
        items.forEach(function(item){
            sH += '<div class="section-card"><div class="sub-title"><span class="badge">'+item.icon+'</span> '+item.title+'</div>';
            sH += '<p class="intro-paragraph">'+item.desc+'</p>';
            if(item.details && item.details.length){
                sH += '<div class="detail-list">';
                item.details.forEach(function(dt){ sH += '<span class="detail-chip">'+dt+'</span>'; });
                sH += '</div>';
            }
            sH += '</div>';
            if(item.cases) item.cases.forEach(function(c){
                caseH += '<div class="case-card"><span class="case-icon">'+item.icon+'</span><div class="case-info"><h4>'+c.name+'</h4><p>'+c.desc+'</p></div></div>';
            });
        });
        document.getElementById('qsServices').innerHTML = sH || '<p style="color:#889;text-align:center">暂无数据</p>';
        document.getElementById('qsCases').innerHTML = caseH || '<p style="color:#889;text-align:center">暂无案例</p>';
    }
})();
</script>
</body>
</html>
