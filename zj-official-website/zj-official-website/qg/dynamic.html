<script src="../js/data-loader.js" data-root="../"></script>
<script src="../js/site-loader.js"></script>
<script src="../js/site-base.js"></script>
<script>
(function(){
    if(!WebData.isReady()){ WebData.onReady(render); return; }
    render();
    function render(){
        var D = SiteLoader.WebData, d = D.get('qg.dynamic');
        if(!d) return;
        document.getElementById('qdTitle').textContent = d.title || '新闻动态';
        document.title = (d.title||'新闻动态') + ' — 中经企管';
        var cn = d.companyNews || [], cnH = '';
        cn.forEach(function(n){ cnH += '<div class="news-card"><span class="news-date">'+n.date+'</span><p class="news-text">'+n.title+' — '+n.summary+'</p></div>'; });
        document.getElementById('qdCompanyNews').innerHTML = cnH || '<p style="color:#889">暂无数据</p>';
        var inews = d.industryNews || [], inH = '';
        inews.forEach(function(n){ inH += '<div class="news-card"><span class="news-date">'+n.date+'</span><p class="news-text">'+n.title+' — '+n.summary+'</p></div>'; });
        document.getElementById('qdIndustryNews').innerHTML = inH || '<p style="color:#889">暂无数据</p>';
    }
})();
</script>
